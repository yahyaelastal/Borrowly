# ======================
# Borrowly - Application Config
# ======================
spring.application.name=Borrowly

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Database (default dev profile)
spring.datasource.url=jdbc:h2:mem:borrowly
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# Allow JPA to defer datasource initialization so data.sql runs after schema
spring.jpa.defer-datasource-initialization=true
